# Manual release button — one run ships both packages in lockstep.
#
# Bump packages/client/package.json in a PR first (the single source of truth),
# merge to main, then run this workflow from main. It:
#   1. reads the version from package.json
#   2. fails if that tag already exists
#   3. creates and pushes the tag  -> Packagist publishes tbtop/admin via webhook
#   4. npm publish (Trusted Publishing / OIDC, no token) -> @tbtop/inertia-admin
#   5. creates a GitHub Release with generated notes
#
# npm publish lives here (not a tag-triggered workflow) because a tag pushed by
# Actions does not trigger other workflows. One button, one run, both packages.
#
# IMPORTANT: this filename (release.yml) is registered as the npm trusted
# publisher on npmjs.com. Renaming it breaks publishing until npmjs.com updates.
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write # push the tag + create the GitHub Release
  id-token: write # OIDC for npm trusted publishing

jobs:
  release:
    name: Tag + publish both packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/client
    steps:
      - uses: actions/checkout@v4

      # Node 22 ships npm >= 11.5.1, required for OIDC publishing.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # prepublishOnly builds dist via tsup, which runs on bun.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Read version
        id: ver
        run: |
          v="$(node -p "require('./package.json').version")"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "resolved version $v"

      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::$TAG already exists — bump the version in package.json first"
            exit 1
          fi
          echo "$TAG is free"

      # Pushing the tag lets Packagist publish the PHP package via its webhook.
      - name: Create and push tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      # OIDC is auto-detected; provenance is generated automatically.
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes
